name: Build installers

# Builds the native OBS teleprompter plugin on all three OSes and produces the
# per-OS installers (TODO 002.D, decision `installers-via-github-ci`):
#   Linux   → .deb + .tar.gz  (CPack DEB;TGZ)   — also verified locally on the dev box
#   Windows → NSIS .exe + .zip (CPack NSIS;ZIP)  — CI-only (no local Windows toolchain)
#   macOS   → .pkg + .tar.gz   (CPack productbuild;TGZ) — CI-only (no local macOS toolchain)
#
# Every push/PR builds + uploads the installers as workflow artifacts so they can
# be downloaded and test-installed. Pushing a version tag (v*) additionally
# publishes them as assets on a GitHub Release.
#
# Artifacts are UNSIGNED (decision `ship-unsigned-installers-first`): the Windows
# .exe trips SmartScreen and the macOS .pkg trips Gatekeeper until signing certs
# exist. The README documents the override. Signing can be layered in later as an
# extra CPack/codesign/notarytool step gated on a cert secret, without
# restructuring this workflow.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed for the release job to upload assets

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            cpack_generators: 'DEB;TGZ'
          - name: Windows
            os: windows-latest
            cpack_generators: 'NSIS;ZIP'
          - name: macOS
            os: macos-latest
            cpack_generators: 'productbuild;TGZ'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux: OBS + Qt6 dev packages come straight from apt (same toolchain
      #    the plugin was scaffolded + verified against on the dev box). ────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential pkg-config \
            obs-studio libobs-dev \
            qt6-base-dev qt6-base-private-dev

      # ── Windows / macOS: build the OBS SDK on the runner. ────────────────────
      # OBS ships no standalone prebuilt libobs SDK, so — following the official
      # obs-plugintemplate approach — we (a) download the prebuilt obs-deps +
      # matching Qt6 bundle (third-party libs + the exact Qt build OBS uses, which
      # avoids Qt ABI mismatch), (b) build obs-studio's `obs-frontend-api` target
      # from source against them (this transitively builds libobs), and (c)
      # install its Development component so libobsConfig.cmake /
      # obs-frontend-apiConfig.cmake land in a prefix our plugin find_package()s.
      #
      # Versions are pinned to OBS 31.1.1's own buildspec (obs-deps + qt6 =
      # 2025-07-11) so libobs/Qt ABI stay coherent — bump all three together when
      # targeting a new OBS major. (OBS 30.0.2's 2023 build scripts break on the
      # current runners' Xcode/VS, so we target OBS 31.)
      - name: Install CMake + Ninja (Windows/macOS)
        if: runner.os != 'Linux'
        uses: lukka/get-cmake@latest

      # Put MSVC (cl/link) on PATH so the Ninja generator can find the compiler
      # without relying on the "Visual Studio 17 2022" generator's VS discovery.
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          # Pin a Windows SDK >= 10.0.20348 (OBS 31 requirement). With the Ninja
          # generator the SDK is taken from this environment, not
          # CMAKE_SYSTEM_VERSION, so it must be selected here.
          sdk: '10.0.26100.0'

      # CPack's NSIS generator needs the `makensis` compiler, which is NOT
      # preinstalled on the windows runner. Install it via Chocolatey so the
      # Package step can build the .exe installer.
      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis --no-progress -y
        shell: pwsh

      - name: Fetch obs-studio source (Windows/macOS)
        if: runner.os != 'Linux'
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          ref: '31.1.1'
          path: obs-studio
          submodules: recursive

      - name: Build OBS SDK from source (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          DEPS_DATE: '2025-07-11'
        run: |
          $base = "https://github.com/obsproject/obs-deps/releases/download/$env:DEPS_DATE"
          Invoke-WebRequest "$base/windows-deps-$env:DEPS_DATE-x64.zip" -OutFile deps.zip
          Invoke-WebRequest "$base/windows-deps-qt6-$env:DEPS_DATE-x64.zip" -OutFile qt6.zip
          Expand-Archive deps.zip -DestinationPath "$PWD/obs-sdk" -Force
          Expand-Archive qt6.zip  -DestinationPath "$PWD/obs-sdk" -Force
          # OBS 31 requires Windows SDK >= 10.0.20348; pin the newest one present
          # on the runner (msvc-dev-cmd may default to an older target).
          $winsdk = (Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\Include' -Directory |
                     Sort-Object Name -Descending | Select-Object -First 1).Name
          Write-Host "Using Windows SDK $winsdk"
          # OBS 31's Windows CMake reads CMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION,
          # which ONLY the Visual Studio generator populates (Ninja leaves it
          # empty → the SDK-version check fatals). Use the default generator so
          # CMake auto-selects the newest installed VS, and pin the platform
          # version + x64.
          cmake -S obs-studio -B obs-studio/build -A x64 `
            -DCMAKE_SYSTEM_VERSION="$winsdk" `
            -DCMAKE_PREFIX_PATH="$PWD/obs-sdk" `
            -DENABLE_PLUGINS=OFF -DENABLE_UI=OFF -DENABLE_FRONTEND_API=ON `
            -DENABLE_SCRIPTING=OFF -DENABLE_WEBSOCKET=OFF
          cmake --build obs-studio/build --config Release --target obs-frontend-api
          cmake --install obs-studio/build --config Release --component Development --prefix "$PWD/obs-sdk"
          Write-Host "=== installed CMake config packages ==="
          Get-ChildItem -Recurse "$PWD/obs-sdk" -Filter "libobsConfig.cmake" | Select-Object FullName

      - name: Build OBS SDK from source (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          DEPS_DATE: '2025-07-11'
        run: |
          base="https://github.com/obsproject/obs-deps/releases/download/${DEPS_DATE}"
          mkdir -p obs-sdk
          curl -sL "$base/macos-deps-${DEPS_DATE}-universal.tar.xz"     | tar -xJ -C obs-sdk
          curl -sL "$base/macos-deps-qt6-${DEPS_DATE}-universal.tar.xz" | tar -xJ -C obs-sdk
          # OBS 31's CMake hard-requires the Xcode generator on macOS.
          cmake -S obs-studio -B obs-studio/build -G Xcode \
            -DCMAKE_PREFIX_PATH="$PWD/obs-sdk" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DENABLE_PLUGINS=OFF -DENABLE_UI=OFF -DENABLE_FRONTEND_API=ON \
            -DENABLE_SCRIPTING=OFF -DENABLE_WEBSOCKET=OFF
          cmake --build obs-studio/build --config Release --target obs-frontend-api
          cmake --install obs-studio/build --config Release --component Development --prefix "$PWD/obs-sdk"
          echo "=== installed CMake config packages ==="
          find "$PWD/obs-sdk" -name 'libobsConfig.cmake' -o -name 'obs-frontend-apiConfig.cmake'

      # ── Configure + build (all OSes) ────────────────────────────────────────
      - name: Configure
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
          else
            # obs-sdk holds BOTH the OBS SDK (built from source) and the obs-deps
            # Qt6, with OS-specific config-package layouts:
            #   Windows: obs-sdk/cmake/{libobs,obs-frontend-api,w32-pthreads,...}Config.cmake
            #            obs-sdk/lib/cmake/Qt6*/…
            #   macOS:   libobs is a FRAMEWORK — its config lives inside it at
            #              obs-sdk/Frameworks/libobs.framework/Versions/A/Resources/cmake/
            #            obs-sdk/lib/cmake/obs-frontend-api/… and obs-sdk/lib/cmake/Qt6*/…
            #
            # Two hard-won lessons from prior rounds:
            #  1. libobs's own config calls find_dependency(w32-pthreads) (Windows)
            #     and pulls Qt6 (both) — so we MUST provide a real CMAKE_PREFIX_PATH
            #     covering obs-sdk/cmake and obs-sdk/lib/cmake, not just a <pkg>_DIR
            #     for libobs, or the *transitive* dependency fails to resolve.
            #  2. On macOS, pointing libobs_DIR straight at the framework-internal
            #     cmake dir breaks libobsTargets' _IMPORT_PREFIX math (it walks up
            #     from the config dir and doubles the framework path →
            #     .../libobs.framework/Frameworks/libobs.framework/…/libobs missing).
            #     libobs must instead be found through the FRAMEWORK mechanism
            #     (CMAKE_FRAMEWORK_PATH = obs-sdk/Frameworks), which sets the import
            #     prefix correctly. So we do NOT set libobs_DIR on macOS.
            #
            # The ';' list is passed as a single quoted -D token (one argv word, so
            # bash never splits it; CMake splits it internally on ';'). Print the
            # tree so any path mismatch stays visible in the log.
            echo "=== obs-sdk config packages ==="
            find "$PWD/obs-sdk" \( -name '*Config.cmake' -o -name '*-config.cmake' \) 2>/dev/null | sort
            # IMPORTANT: on Windows, bash's $PWD is an MSYS path (/d/a/…) that the
            # NATIVE Windows cmake.exe cannot resolve — so a CMAKE_PREFIX_PATH
            # built from $PWD silently matches nothing and find_package(libobs)
            # fails even though the config is right there. Convert to a Windows
            # path (D:/a/…) with `pwd -W` (Git-bash) for the prefix. macOS/Linux
            # keep the plain Unix $PWD.
            if [ "${{ runner.os }}" = "Windows" ]; then
              ROOT="$(pwd -W)"
            else
              ROOT="$PWD"
            fi
            echo "ROOT=$ROOT"
            PREFIX="$ROOT/obs-sdk;$ROOT/obs-sdk/cmake;$ROOT/obs-sdk/lib/cmake"
            if [ "${{ runner.os }}" = "macOS" ]; then
              cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DCMAKE_PREFIX_PATH="$PREFIX" \
                -DCMAKE_FRAMEWORK_PATH="$ROOT/obs-sdk/Frameworks"
            else
              cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DCMAKE_PREFIX_PATH="$PREFIX"
            fi
          fi

      - name: Build
        run: cmake --build build --config RelWithDebInfo

      # ── Package with CPack (per-OS generators) ──────────────────────────────
      - name: Package
        working-directory: build
        run: cpack -C RelWithDebInfo -G "${{ matrix.cpack_generators }}"

      # TEMP diagnostic (macOS): the productbuild .pkg comes out empty even though
      # the staged install tree is correct. Re-run cpack VERBOSE to capture the
      # exact pkgbuild/productbuild invocations and dump the generated
      # distribution.dist so we can see why the component payload is dropped.
      - name: DIAG macOS productbuild invocation
        if: runner.os == 'macOS'
        shell: bash
        working-directory: build
        run: |
          echo "=== TGZ contents (proves the staged install tree is correct) ==="
          tgz=$(ls *.tar.gz | head -n1); tar tzf "$tgz" 2>/dev/null | head
          echo "=== distribution.dist (productbuild input) ==="
          find _CPack_Packages -name 'distribution.dist' -exec cat {} \; 2>/dev/null || echo "(none)"
          echo "=== component pkg size (empty == the bug) ==="
          ls -l _CPack_Packages/Darwin/productbuild/*/Contents/Packages/ 2>/dev/null || true
          echo "=== re-run cpack productbuild VERBOSE (exact pkgbuild/productbuild cmds) ==="
          rm -rf _CPack_Packages/Darwin/productbuild
          cpack -C RelWithDebInfo -G productbuild --verbose --debug 2>&1 \
            | grep -iE 'pkgbuild|productbuild|--root|--install-location|--component|--identifier|--scripts|Execute:|Run command|error|warn' \
            | head -60 || true

      # ── Assert installer PAYLOAD LOCATION (catches the GO-005 defect class) ───
      # CI builds+packages but never installs+launches OBS, so a green Package
      # step does NOT prove the files land where OBS scans. These checks expand
      # each installer and assert the payload paths, failing CI on a wrong
      # install location (e.g. Program Files instead of the OBS plugin tree).
      # This is our ONLY automated guard for macOS (no Mac to install on) and a
      # cheap regression guard for Windows.
      - name: Assert macOS .pkg payload lands in the OBS plugin dir
        if: runner.os == 'macOS'
        shell: bash
        working-directory: build
        run: |
          pkg=$(ls *.pkg | head -n1)
          echo "=== $pkg ($(du -h "$pkg" | cut -f1)) ==="
          # `pkgutil --payload-files` reads the SHIPPED .pkg directly and lists
          # every archived install path — the canonical way to inspect a product
          # archive's payload (no manual xar/cpio plumbing). A real payload here
          # also proves the CPACK_MONOLITHIC_INSTALL fix worked: before it, the
          # productbuild component was empty and this listed nothing.
          paths=$(pkgutil --payload-files "$pkg" 2>/dev/null)
          echo "=== .pkg payload files ==="
          echo "${paths:-<empty>}"
          [ -n "$paths" ] || { echo "FAIL: .pkg payload is EMPTY (installs nothing — check CPACK_MONOLITHIC_INSTALL / install() rules)"; exit 1; }
          # productbuild archives the install paths RELATIVE to the component's
          # install-location, so the bundle appears at the payload root as
          # obs-teleprompter.plugin/Contents/... — match anywhere in the path.
          echo "$paths" | grep -E '(^|/)obs-teleprompter\.plugin/Contents/MacOS/obs-teleprompter$' \
            || { echo "FAIL: .plugin Mach-O not in the .pkg payload"; exit 1; }
          echo "$paths" | grep -E '(^|/)obs-teleprompter\.plugin/Contents/Resources/locale/en-US\.ini$' \
            || { echo "FAIL: locale not inside the .plugin bundle"; exit 1; }
          # WHERE the bundle lands (the GO-005 defect class) = the component's
          # install-location prefix in PackageInfo. Extract it with xar and assert
          # it is the OBS plugins dir, not '/' or an arbitrary prefix.
          mkdir -p pkg-xar && xar -xf "$pkg" -C pkg-xar
          echo "=== PackageInfo install-location(s) ==="
          find pkg-xar -name PackageInfo -exec cat {} \; | grep -o 'install-location="[^"]*"' || true
          find pkg-xar -name PackageInfo -exec cat {} \; | grep -o 'install-location="[^"]*"' \
            | grep -E 'install-location="/?Library/Application Support/obs-studio/plugins/?"' \
            || { echo "FAIL: component install-location is not the OBS plugins dir"; exit 1; }
          echo "OK: macOS .pkg installs the plugin bundle into the OBS plugin dir"

      - name: Assert Windows .zip has the OBS drop-in layout
        if: runner.os == 'Windows'
        shell: bash
        working-directory: build
        run: |
          zip=$(ls *.zip | grep -v portable | head -n1)
          echo "=== $zip contents ==="
          unzip -l "$zip"
          # The ZIP generator names the single top folder after
          # CPACK_PACKAGE_FILE_NAME (obs-teleprompter-windows-x86_64/), NOT
          # CPACK_PACKAGE_INSTALL_DIRECTORY — so match the OBS drop-in tree under
          # ANY top dir (.*/bin/64bit/...). The .exe installer (asserted below) is
          # what carries the real %APPDATA% install ROOT; the .zip only proves the
          # bin/64bit + data/locale drop-in LAYOUT is intact.
          unzip -l "$zip" | grep -E '(^|/)bin/64bit/obs-teleprompter\.dll$' \
            || { echo "FAIL: .dll not at <top>/bin/64bit/ in the zip"; exit 1; }
          unzip -l "$zip" | grep -E '(^|/)data/locale/en-US\.ini$' \
            || { echo "FAIL: locale not at <top>/data/locale/ in the zip"; exit 1; }
          echo "OK: Windows .zip carries the OBS drop-in layout (bin/64bit + data/locale)"

      # The .exe is the REAL installer and the true GO-005 guard: it carries the
      # install ROOT ($APPDATA\obs-studio\plugins, NOT $PROGRAMFILES). The install
      # root is an NSIS runtime builtin ($APPDATA), resolved at install time, so
      # it can't be read from the compiled .exe — but CPack writes it verbatim
      # into the generated NSIS script (project.nsi) as the InstallDir. Assert
      # that script roots the install at $APPDATA\obs-studio\plugins\obs-teleprompter
      # and runs per-user (unelevated), and that the .exe embeds the drop-in tree.
      - name: Assert Windows .exe roots the install at the per-user OBS plugin dir
        if: runner.os == 'Windows'
        shell: bash
        working-directory: build
        run: |
          nsi=$(find _CPack_Packages -name project.nsi | head -n1)
          echo "=== NSIS install script: $nsi ==="
          [ -n "$nsi" ] || { echo "FAIL: generated project.nsi not found"; exit 1; }
          grep -nE 'InstallDir|RequestExecutionLevel|SetShellVarContext' "$nsi" || true
          # InstallDir must be $APPDATA\obs-studio\plugins\obs-teleprompter (CPack
          # joins CPACK_NSIS_INSTALL_ROOT + CPACK_PACKAGE_INSTALL_DIRECTORY with a
          # backslash and forward slashes in the ROOT are normalized to '\').
          grep -E 'InstallDir[[:space:]]+"?\$APPDATA[\\/]obs-studio[\\/]plugins[\\/]obs-teleprompter"?' "$nsi" \
            || { echo "FAIL: InstallDir is not \$APPDATA\\obs-studio\\plugins\\obs-teleprompter (GO-005 regression: check it is not \$PROGRAMFILES)"; exit 1; }
          # Must be a per-user (unelevated) install so $APPDATA resolves to the
          # current user's Roaming dir where OBS scans for plugins.
          grep -E 'RequestExecutionLevel[[:space:]]+user' "$nsi" \
            || { echo "FAIL: installer is not RequestExecutionLevel user (per-user)"; exit 1; }
          # And confirm the .exe actually embeds the OBS drop-in payload tree.
          exe=$(ls *.exe | head -n1)
          echo "=== $exe embedded payload (7z listing) ==="
          7z l "$exe" | tee exe-listing.txt
          grep -E 'bin[\\/]64bit[\\/]obs-teleprompter\.dll' exe-listing.txt \
            || { echo "FAIL: .dll not embedded at bin\\64bit\\ in the .exe"; exit 1; }
          grep -E 'data[\\/]locale[\\/]en-US\.ini' exe-listing.txt \
            || { echo "FAIL: locale not embedded at data\\locale\\ in the .exe"; exit 1; }
          echo "OK: Windows .exe installs per-user into \$APPDATA\\obs-studio\\plugins\\obs-teleprompter"

      # ── Portable "drag-into-OBS" folder (no installer, no admin rights) ──────
      - name: Stage portable plugin folder
        run: cmake --build build --config RelWithDebInfo --target portable

      - name: Zip portable folder
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   os=linux ;;
            Windows) os=windows ;;
            macOS)   os=macos ;;
          esac
          ( cd build/portable && \
            cmake -E tar cf "obs-teleprompter-${os}-portable.zip" --format=zip obs-teleprompter )
          ls -l build/portable/*.zip

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist
          # DEB/TGZ/NSIS(.exe)/ZIP/PKG all land in build/ next to CPackConfig;
          # the portable drag-in zip lands in build/portable/.
          find build -maxdepth 1 -type f \
            \( -name '*.deb' -o -name '*.tar.gz' -o -name '*.exe' \
               -o -name '*.zip' -o -name '*.pkg' -o -name '*.dmg' \) \
            -exec cp {} dist/ \;
          cp build/portable/*-portable.zip dist/ 2>/dev/null || true
          ls -l dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obs-teleprompter-${{ matrix.name }}
          path: dist/*
          if-no-files-found: warn

  # ── Release: on a version tag, gather all OS artifacts into one Release. ─────
  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            Native OBS teleprompter dock — per-OS installers **and** drag-into-OBS
            portable folders.

            **Option A — installer:** download the file for your OS and run it
            (`*-linux-x86_64.deb`, `*-windows-x86_64.exe`, `*-macos.pkg`).

            **Option B — portable (no admin rights):** download
            `obs-teleprompter-<os>-portable.zip`, unzip it, and drop the
            `obs-teleprompter` folder into your OBS plugins dir:
            `~/.config/obs-studio/plugins/` (Linux),
            `%APPDATA%\obs-studio\plugins\` (Windows), or
            `~/Library/Application Support/obs-studio/plugins/` (macOS).

            Either way, launch OBS Studio and the **Teleprompter** dock appears
            automatically under **Docks** (no Custom Browser Dock, no URL, no
            WebSocket config).

            > The installers are **unsigned**. Windows SmartScreen may warn:
            > click **More info → Run anyway**. macOS Gatekeeper may block the
            > `.pkg`: **right-click → Open**, or run
            > `xattr -dr com.apple.quarantine <file>.pkg`. See the README.
